name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install backend deps
        run: |
          cd backend
          pip install -r requirements.txt
          pip install ruff pytest
      - name: Lint backend
        run: |
          cd backend
          ruff check app tests
      - name: Test backend
        run: |
          cd backend
          pytest -q
      - name: Install frontend deps
        run: |
          cd frontend
          npm ci
      - name: Lint frontend
        run: |
          cd frontend
          npx eslint . --ext .ts,.tsx
      - name: Test frontend
        run: |
          cd frontend
          npm run build
